<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌸 软糖相册 · 少女心 AI 解读</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe9f4 0%, #ffd9e8 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .glass-card {
            max-width: 720px;
            width: 100%;
            background: rgba(255, 245, 248, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 20px 60px rgba(255, 130, 160, 0.20),
                        0 8px 24px rgba(255, 100, 140, 0.10);
            border: 1px solid rgba(255, 220, 235, 0.5);
            transition: all 0.25s ease;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #a34a6a;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.25rem;
        }

        h1 small {
            font-size: 1rem;
            font-weight: 400;
            color: #c47a94;
            margin-left: 0.5rem;
            letter-spacing: 0.3px;
        }

        .subhead {
            color: #b sixteen 6a84;
            font-size: 0.95rem;
            border-left: 3px solid #f9b8cc;
            padding-left: 0.9rem;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .key-section {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            padding: 0.3rem 0.3rem 0.3rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 180, 200, 0.3);
        }

        .key-section label {
            font-weight: 500;
            color: #8f4b64;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .key-section input {
            flex: 1;
            min-width: 160px;
            border: none;
            background: transparent;
            padding: 0.7rem 0.2rem;
            font-size: 0.95rem;
            color: #3d2a30;
            outline: none;
            font-family: inherit;
        }

        .key-section input::placeholder {
            color: #c99aa8;
            font-weight: 300;
            letter-spacing: 0.2px;
        }

        .key-section button {
            background: #f4c4d6;
            border: none;
            border-radius: 40px;
            padding: 0.6rem 1.4rem;
            font-weight: 600;
            color: #6d3b4e;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(255, 120, 160, 0.15);
            white-space: nowrap;
        }

        .key-section button:hover {
            background: #f0b4ca;
            transform: scale(0.97);
        }

        .upload-zone {
            background: rgba(255, 240, 245, 0.6);
            border: 2px dashed #f9bace;
            border-radius: 48px;
            padding: 2.2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: 0.25s;
            margin-bottom: 1.8rem;
            position: relative;
        }

        .upload-zone:hover {
            background: rgba(255, 230, 240, 0.8);
            border-color: #f09cb6;
        }

        .upload-zone.dragover {
            background: #ffdce8;
            border-color: #e880a4;
        }

        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 3.2rem;
            line-height: 1;
            margin-bottom: 0.2rem;
        }

        .upload-zone p {
            color: #b sixteen 6a84;
            font-weight: 500;
            font-size: 1.1rem;
        }

        .upload-zone .hint {
            font-size: 0.85rem;
            color: #cc93a6;
            margin-top: 0.2rem;
        }

        .preview-box {
            background: rgba(255, 248, 250, 0.6);
            border-radius: 40px;
            padding: 1.5rem 1.2rem;
            margin: 1.8rem 0 1.2rem;
            border: 1px solid rgba(255, 200, 215, 0.4);
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .preview-box.show {
            display: flex;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 360px;
            border-radius: 28px;
            box-shadow: 0 8px 24px rgba(255, 80, 120, 0.15);
            object-fit: contain;
            background: #fff4f8;
        }

        .result-area {
            background: rgba(255, 240, 245, 0.5);
            border-radius: 32px;
            padding: 1.5rem 1.5rem 1.2rem;
            margin-top: 0.8rem;
            width: 100%;
            border: 1px solid rgba(255, 200, 215, 0.3);
            display: none;
        }

        .result-area.show {
            display: block;
        }

        .result-area h3 {
            color: #9f516f;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.7rem;
        }

        .result-content {
            color: #3d2a30;
            font-size: 0.98rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .result-content .loading-dots::after {
            content: '...';
            animation: dots 1.2s steps(3) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }

        .action-row {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 1.8rem;
            justify-content: center;
        }

        .btn-primary {
            background: #f5c4d8;
            border: none;
            border-radius: 60px;
            padding: 0.9rem 2.2rem;
            font-weight: 600;
            font-size: 1rem;
            color: #6d3b4e;
            box-shadow: 0 6px 16px rgba(255, 110, 150, 0.2);
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-primary:hover {
            background: #f0b4ca;
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(255, 100, 140, 0.25);
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-secondary {
            background: rgba(255, 220, 230, 0.6);
            border: 1px solid #f5c4d8;
            border-radius: 60px;
            padding: 0.9rem 2rem;
            font-weight: 500;
            color: #8f4b64;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-secondary:hover {
            background: #fadce8;
        }

        .footnote {
            margin-top: 1.8rem;
            font-size: 0.75rem;
            color: #bc8b9c;
            text-align: center;
            border-top: 1px solid rgba(255, 180, 200, 0.25);
            padding-top: 1.5rem;
            letter-spacing: 0.3px;
        }

        .footnote a {
            color: #bb7b92;
            text-decoration: none;
            border-bottom: 1px dotted #f2b8cc;
        }

        @media (max-width: 500px) {
            .glass-card {
                padding: 1.5rem;
                border-radius: 40px;
            }
            h1 {
                font-size: 1.8rem;
                flex-wrap: wrap;
            }
            .key-section {
                padding-left: 1rem;
            }
            .key-section button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="glass-card" role="main">
        <h1>
            🧁 软糖相册
            <small>· 少女心 AI 解读</small>
        </h1>
        <div class="subhead">给照片一点温柔的解释 ✨</div>

        <div class="key-section">
            <label for="apiKeyInput">🔑 密钥</label>
            <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." autocomplete="off" />
            <button id="saveKeyBtn">💾 保存</button>
        </div>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">🌸</div>
            <p>拖入照片 · 或点击浏览</p>
            <div class="hint">支持 jpg, png, webp</div>
            <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp" />
        </div>

        <div class="preview-box" id="previewBox">
            <img id="previewImg" alt="预览" />
        </div>

        <div class="result-area" id="resultArea">
            <h3>🧸 软糖解读</h3>
            <div class="result-content" id="resultContent">点击「✨ 让 AI 看看」就会出现在这里</div>
        </div>

        <div class="action-row">
            <button class="btn-primary" id="analyzeBtn">✨ 让 AI 看看</button>
            <button class="btn-secondary" id="clearBtn">🧹 清除</button>
        </div>

        <div class="footnote">
            🍬 模型 · <a href="https://openrouter.ai/" target="_blank">OpenRouter</a> / Claude Sonnet 4.5
        </div>
    </div>

    <script>
        (function() {
            const fileInput = document.getElementById('fileInput');
            const uploadZone = document.getElementById('uploadZone');
            const previewBox = document.getElementById('previewBox');
            const previewImg = document.getElementById('previewImg');
            const resultArea = document.getElementById('resultArea');
            const resultContent = document.getElementById('resultContent');
            const apiInput = document.getElementById('apiKeyInput');
            const saveKeyBtn = document.getElementById('saveKeyBtn');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const clearBtn = document.getElementById('clearBtn');

            let currentFile = null;
            let currentImageDataUrl = null;

            function loadApiKey() {
                const saved = localStorage.getItem('openrouter_api_key');
                if (saved) {
                    apiInput.value = saved;
                }
            }

            function saveApiKey() {
                const key = apiInput.value.trim();
                if (key) {
                    localStorage.setItem('openrouter_api_key', key);
                    alert('✅ 密钥已保存到本地');
                } else {
                    localStorage.removeItem('openrouter_api_key');
                    alert('🗑️ 已清除密钥');
                }
            }

            function handleFile(file) {
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件 🖼️');
                    return;
                }
                currentFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImageDataUrl = e.target.result;
                    previewImg.src = currentImageDataUrl;
                    previewBox.classList.add('show');
                    resultArea.classList.remove('show');
                    resultContent.textContent = '点击「✨ 让 AI 看看」分析这张图';
                };
                reader.readAsDataURL(file);
            }

            async function analyzeImage() {
                // 优先从 localStorage 取 key，取不到再读输入框
                let apiKey = localStorage.getItem('openrouter_api_key');
                if (!apiKey) {
                    apiKey = apiInput.value.trim();
                }
                if (!apiKey) {
                    alert('请先输入 OpenRouter API Key 并点击保存 🔑');
                    return;
                }
                // 回显到输入框，保持一致性
                apiInput.value = apiKey;

                if (!currentFile || !currentImageDataUrl) {
                    alert('请先上传一张图片 🌸');
                    return;
                }

                resultContent.textContent = '🍬 正在思考... 请稍候';
                resultContent.classList.add('loading-dots');
                resultArea.classList.add('show');

                const base64String = currentImageDataUrl.split(',')[1];

                const payload = {
                    model: 'anthropic/claude-sonnet-4-5',
                    messages: [
                        {
                            role: 'user',
                            content: [
                                {
                                    type: 'text',
                                    text: '请用温暖、少女心、细腻的语气描述这张图片。' +
                                          '可以聊聊色彩、氛围、情绪，给它起一个可爱的名字。' +
                                          '不要太长，3~5 句话即可。'
                                },
                                {
                                    type: 'image',
                                    image: base64String
                                }
                            ]
                        }
                    ],
                    max_tokens: 400,
                    temperature: 0.7
                };

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        let errorMsg = `API 请求失败 (${response.status})`;
                        try {
                            const errData = await response.json();
                            if (errData.error) {
                                errorMsg += `: ${errData.error.message || JSON.stringify(errData.error)}`;
                            }
                        } catch (_) {}
                        throw new Error(errorMsg);
                    }

                    const data = await response.json();
                    const content = data?.choices?.[0]?.message?.content;
                    if (content) {
                        resultContent.textContent = content;
                    } else {
                        throw new Error('返回内容为空，请重试');
                    }
                } catch (error) {
                    resultContent.textContent = `❌ 出错了：${error.message}`;
                } finally {
                    resultContent.classList.remove('loading-dots');
                }
            }

            function clearAll() {
                currentFile = null;
                currentImageDataUrl = null;
                previewBox.classList.remove('show');
                previewImg.src = '';
                resultArea.classList.remove('show');
                resultContent.textContent = '点击「✨ 让 AI 看看」分析这张图';
                fileInput.value = '';
            }

            fileInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    handleFile(e.target.files[0]);
                }
            });

            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.classList.add('dragover');
            });
            uploadZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                uploadZone.classList.remove('dragover');
            });
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files && files.length > 0) {
                    handleFile(files[0]);
                    const dt = new DataTransfer();
                    dt.items.add(files[0]);
                    fileInput.files = dt.files;
                }
            });

            saveKeyBtn.addEventListener('click', saveApiKey);
            apiInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    saveApiKey();
                }
            });

            analyzeBtn.addEventListener('click', analyzeImage);
            clearBtn.addEventListener('click', clearAll);

            loadApiKey();
        })();
    </script>
</body>
</html>
