<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌸 软糖相册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: linear-gradient(145deg, #ffe9f4 0%, #ffd9e8 100%); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; padding: 1.5rem; }
        .glass-card { max-width: 820px; width: 100%; background: rgba(255,245,248,0.75); backdrop-filter: blur(12px); border-radius: 56px; padding: 2rem 2rem 2.5rem; box-shadow: 0 20px 60px rgba(255,130,160,0.20); border: 1px solid rgba(255,220,235,0.5); }
        h1 { font-size: 2.2rem; font-weight: 600; color: #a34a6a; display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.25rem; }
        h1 small { font-size: 1rem; font-weight: 400; color: #c47a94; margin-left: 0.5rem; }
        .subhead { color: #b16a84; font-size: 0.95rem; border-left: 3px solid #f9b8cc; padding-left: 0.9rem; margin-bottom: 2rem; opacity: 0.8; }
        .key-section { background: rgba(255,255,255,0.5); border-radius: 40px; padding: 0.3rem 0.3rem 0.3rem 1.5rem; display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-bottom: 2rem; border: 1px solid rgba(255,180,200,0.3); }
        .key-section label { font-weight: 500; color: #8f4b64; font-size: 0.9rem; }
        .key-section input { flex: 1; min-width: 160px; border: none; background: transparent; padding: 0.7rem 0.2rem; font-size: 0.95rem; color: #3d2a30; outline: none; font-family: inherit; }
        .key-section input::placeholder { color: #c99aa8; }
        .key-section button { background: #f4c4d6; border: none; border-radius: 40px; padding: 0.6rem 1.4rem; font-weight: 600; color: #6d3b4e; font-size: 0.9rem; cursor: pointer; }
        .upload-zone { background: rgba(255,240,245,0.6); border: 2px dashed #f9bace; border-radius: 48px; padding: 2.2rem 1rem; text-align: center; cursor: pointer; margin-bottom: 1.8rem; }
        .upload-zone:hover { background: rgba(255,230,240,0.8); border-color: #f09cb6; }
        .upload-icon { font-size: 3.2rem; line-height: 1; margin-bottom: 0.2rem; }
        .upload-zone p { color: #b16a84; font-weight: 500; font-size: 1.1rem; }
        .upload-zone .hint { font-size: 0.85rem; color: #cc93a6; margin-top: 0.2rem; }
        .thumb-grid { display: flex; flex-wrap: wrap; gap: 0.8rem; margin: 1.2rem 0; }
        .thumb-item { width: 80px; height: 80px; border-radius: 20px; overflow: hidden; border: 3px solid transparent; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 12px rgba(255,100,140,0.15); position: relative; flex-shrink: 0; }
        .thumb-item.active { border-color: #e880a4; box-shadow: 0 0 0 4px #ffd0df; }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .thumb-item .remove-btn { position: absolute; top: -6px; right: -6px; background: #ff6b8a; color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 14px; line-height: 22px; text-align: center; cursor: pointer; opacity: 0; transition: 0.2s; }
        .thumb-item:hover .remove-btn { opacity: 1; }
        .empty-thumb-hint { color: #c99aa8; font-size: 0.9rem; padding: 0.8rem 0; }
        .preview-box { background: rgba(255,248,250,0.6); border-radius: 40px; padding: 1.5rem 1.2rem; margin: 1.2rem 0; border: 1px solid rgba(255,200,215,0.4); display: none; flex-direction: column; align-items: center; }
        .preview-box.show { display: flex; }
        .preview-box img { max-width: 100%; max-height: 360px; border-radius: 28px; box-shadow: 0 8px 24px rgba(255,80,120,0.15); object-fit: contain; }
        .result-area { background: rgba(255,240,245,0.5); border-radius: 32px; padding: 1.5rem; margin-top: 0.8rem; border: 1px solid rgba(255,200,215,0.3); display: none; }
        .result-area.show { display: block; }
        .result-area h3 { color: #9f516f; font-weight: 600; font-size: 1.1rem; margin-bottom: 0.7rem; }
        .result-content { color: #3d2a30; font-size: 0.98rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .action-row { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 1.8rem; justify-content: center; }
        .btn-primary { background: #f5c4d8; border: none; border-radius: 60px; padding: 0.9rem 2.2rem; font-weight: 600; font-size: 1rem; color: #6d3b4e; box-shadow: 0 6px 16px rgba(255,110,150,0.2); cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background: #f0b4ca; transform: translateY(-2px); }
        .btn-secondary { background: rgba(255,220,230,0.6); border: 1px solid #f5c4d8; border-radius: 60px; padding: 0.9rem 2rem; font-weight: 500; color: #8f4b64; cursor: pointer; }
        .footnote { margin-top: 1.8rem; font-size: 0.75rem; color: #bc8b9c; text-align: center; border-top: 1px solid rgba(255,180,200,0.25); padding-top: 1.5rem; }
        @media (max-width: 500px) { .glass-card { padding: 1.5rem; border-radius: 40px; } h1 { font-size: 1.8rem; } .thumb-item { width: 64px; height: 64px; } }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>🧁 软糖相册 <small>· 少女心 AI 解读</small></h1>
        <div class="subhead">上传照片，让 AI 给它一点温柔的解释 ✨</div>
        <div class="key-section">
            <label for="apiKeyInput">🔑 密钥</label>
            <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." autocomplete="off" />
            <button id="saveKeyBtn">保存</button>
        </div>
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">🌸</div>
            <p>点击上传照片</p>
            <div class="hint">支持 jpg, png, webp</div>
        </div>
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" multiple style="display:none" />
        <div class="thumb-grid" id="thumbGrid"><div class="empty-thumb-hint">还没有照片 🍬</div></div>
        <div class="preview-box" id="previewBox"><img id="previewImg" alt="预览" /></div>
        <div class="result-area" id="resultArea">
            <h3>🧸 软糖解读</h3>
            <div class="result-content" id="resultContent"></div>
        </div>
        <div class="action-row">
            <button class="btn-primary" id="analyzeBtn">✨ 让 AI 看看</button>
            <button class="btn-secondary" id="clearBtn">🧹 清除</button>
        </div>
        <div class="footnote">🍬 由 Claude · OpenRouter 驱动</div>
    </div>
    <script>
    (function() {
        var fileInput = document.getElementById('fileInput');
        var uploadZone = document.getElementById('uploadZone');
        var thumbGrid = document.getElementById('thumbGrid');
        var previewBox = document.getElementById('previewBox');
        var previewImg = document.getElementById('previewImg');
        var resultArea = document.getElementById('resultArea');
        var resultContent = document.getElementById('resultContent');
        var apiInput = document.getElementById('apiKeyInput');
        var saveKeyBtn = document.getElementById('saveKeyBtn');
        var analyzeBtn = document.getElementById('analyzeBtn');
        var clearBtn = document.getElementById('clearBtn');
        var imageList = [], selectedId = null, idCounter = 0;

        function loadApiKey() { var s = localStorage.getItem('openrouter_api_key'); if (s) apiInput.value = s; }
        function saveApiKey() { var k = apiInput.value.trim(); if (k) { localStorage.setItem('openrouter_api_key', k); alert('已保存'); } else { localStorage.removeItem('openrouter_api_key'); } }
        function renderThumbs() {
            if (imageList.length === 0) { thumbGrid.innerHTML = '<div class="empty-thumb-hint">还没有照片 🍬</div>'; previewBox.classList.remove('show'); resultArea.classList.remove('show'); selectedId = null; return; }
            var html = '';
            imageList.forEach(function(item) { var a = item.id === selectedId ? 'active' : ''; html += '<div class="thumb-item ' + a + '" data-id="' + item.id + '"><img src="' + item.dataUrl + '" /><button class="remove-btn" data-id="' + item.id + '">x</button></div>'; });
            thumbGrid.innerHTML = html;
            document.querySelectorAll('.thumb-item').forEach(function(el) { el.addEventListener('click', function(e) { if (e.target.classList.contains('remove-btn')) return; selectImage(Number(el.dataset.id)); }); });
            document.querySelectorAll('.remove-btn').forEach(function(btn) { btn.addEventListener('click', function(e) { e.stopPropagation(); removeImage(Number(btn.dataset.id)); }); });
            if (!selectedId || !imageList.find(function(i) { return i.id === selectedId; })) { if (imageList.length > 0) selectImage(imageList[0].id); }
        }
        function selectImage(id) { var item = imageList.find(function(i) { return i.id === id; }); if (!item) return; selectedId = id; previewImg.src = item.dataUrl; previewBox.classList.add('show'); resultArea.classList.remove('show'); resultContent.textContent = ''; renderThumbs(); }
        function removeImage(id) { imageList = imageList.filter(function(i) { return i.id !== id; }); if (selectedId === id) { selectedId = null; previewBox.classList.remove('show'); resultArea.classList.remove('show'); } renderThumbs(); if (imageList.length > 0 && !selectedId) selectImage(imageList[0].id); }
        function addFiles(files) {
            var valid = Array.from(files).filter(function(f) { return f.type.startsWith('image/'); });
            var loaded = 0;
            valid.forEach(function(file) {
                var reader = new FileReader();
                reader.onload = function(e) { imageList.push({ id: ++idCounter, dataUrl: e.target.result, mime: file.type }); loaded++; if (loaded === valid.length) { renderThumbs(); selectImage(imageList[imageList.length - 1].id); } };
                reader.readAsDataURL(file);
            });
        }
        function clearAll() { imageList = []; selectedId = null; previewBox.classList.remove('show'); resultArea.classList.remove('show'); renderThumbs(); fileInput.value = ''; }
        async function analyzeImage() {
            var apiKey = localStorage.getItem('openrouter_api_key') || apiInput.value.trim();
            if (!apiKey) { alert('请先保存 API Key'); return; }
            if (!selectedId) { alert('请先选中一张图片'); return; }
            var current = imageList.find(function(i) { return i.id === selectedId; });
            if (!current) return;
            resultContent.textContent = '🍬 正在思考中…';
            resultArea.classList.add('show');
            var mime = current.mime || 'image/jpeg';
            var base64 = current.dataUrl.split(',')[1];
            try {
                var response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey, 'HTTP-Referer': window.location.href, 'X-Title': 'Soft Candy Album' },
                    body: JSON.stringify({ model: 'anthropic/claude-sonnet-4-5', messages: [{ role: 'user', content: [{ type: 'image_url', image_url: { url: 'data:' + mime + ';base64,' + base64 } }, { type: 'text', text: '请用温暖、少女心、细腻的语气描述这张图片。可以聊聊色彩、氛围、情绪，给它起一个可爱的名字。不要太长，3~5句话即可。' }] }], max_tokens: 400 })
                });
                if (!response.ok) { var err = await response.json().catch(function(){return {};}); throw new Error('(' + response.status + '): ' + ((err.error && err.error.message) ? err.error.message : response.statusText)); }
                var data = await response.json();
                var text = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
                resultContent.textContent = text || '返回为空，请重试';
            } catch(e) { resultContent.textContent = 'X 出错了：' + e.message; }
        }
        uploadZone.addEventListener('click', function() { fileInput.click(); });
        fileInput.addEventListener('change', function(e) { if (e.target.files && e.target.files.length > 0) addFiles(e.target.files); fileInput.value = ''; });
        uploadZone.addEventListener('dragover', function(e) { e.preventDefault(); });
        uploadZone.addEventListener('drop', function(e) { e.preventDefault(); if (e.dataTransfer.files && e.dataTransfer.files.length > 0) addFiles(e.dataTransfer.files); });
        saveKeyBtn.addEventListener('click', saveApiKey);
        apiInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') saveApiKey(); });
        analyzeBtn.addEventListener('click', analyzeImage);
        clearBtn.addEventListener('click', clearAll);
        loadApiKey();
        renderThumbs();
    })();
    </script>
</body>
</html>
